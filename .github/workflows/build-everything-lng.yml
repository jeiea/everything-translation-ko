name: Check or Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    name: Upload Everything.lng
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build Everything.lng
        run: .\makelng.exe -s

      - uses: actions/upload-artifact@v7
        with:
          name: Everything.lng
          path: Everything.lng
          if-no-files-found: error

  release:
    name: Upload or Release Everything.lng
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Build Everything.lng
        run: .\makelng.exe -s

      - uses: actions/attest@v4
        if: github.event.repository.visibility == 'public'
        with:
          subject-path: ${{ github.workspace }}/Everything.lng

      - uses: actions/upload-artifact@v7
        with:
          name: Everything.lng
          path: Everything.lng
          if-no-files-found: error

      - name: Create or update GitHub release
        if: github.ref_type == 'tag'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "Everything.lng"

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $asset --verify-tag --generate-notes
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release for tag $tag."
            }
            exit 0
          }

          gh release upload $tag $asset --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload release asset for tag $tag."
          }
